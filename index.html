<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Cam Holistic Tracker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #e2e8f0;
      }

      .app {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }

      .panel {
        padding: 1rem;
      }

      .left-panel {
        background: linear-gradient(160deg, #111827, #1f2937);
        display: grid;
        place-items: center;
      }

      .image-card {
        width: min(92%, 720px);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 0.75rem;
        box-shadow: 0 16px 32px rgb(0 0 0 / 0.35);
      }

      .image-card img {
        width: 100%;
        height: auto;
        border-radius: 12px;
        display: block;
      }

      .image-card h2,
      .image-card p {
        margin: 0.75rem 0 0;
      }

      .right-panel {
        position: relative;
        background: #020617;
        overflow: hidden;
      }

      .video-wrap {
        position: absolute;
        inset: 0;
      }

      video,
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      canvas {
        z-index: 1;
      }

      .hud {
        position: absolute;
        left: 1rem;
        top: 1rem;
        padding: 0.6rem 0.8rem;
        border: 1px solid #334155;
        background: rgb(2 6 23 / 0.7);
        border-radius: 10px;
        z-index: 2;
        backdrop-filter: blur(6px);
        line-height: 1.4;
      }

      .hud strong {
        color: #22d3ee;
      }

      .error {
        color: #fca5a5;
        font-size: 0.95rem;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        .left-panel,
        .right-panel {
          min-height: 50vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel left-panel">
        <div class="image-card">
          <img id="poseImage" alt="Image that will change based on recognized gesture" />
          <h2 id="poseTitle">Waiting for body, hands, and face</h2>
          <p id="poseDescription">
            Holistic tracking is active: full pose + both hands + face landmarks (including mouth points).
          </p>
          <p class="error" id="errorText"></p>
        </div>
      </section>

      <section class="panel right-panel">
        <div class="hud">
          Label: <strong id="currentLabel">none</strong><br />
          Pose: <strong id="poseCount">0</strong> | Hands: <strong id="handCount">0</strong> | Face: <strong id="faceCount">0</strong>
        </div>
        <div class="video-wrap">
          <video id="camera" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
      const video = document.getElementById("camera");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");

      const labelEl = document.getElementById("currentLabel");
      const poseCountEl = document.getElementById("poseCount");
      const handCountEl = document.getElementById("handCount");
      const faceCountEl = document.getElementById("faceCount");

      const imageEl = document.getElementById("poseImage");
      const titleEl = document.getElementById("poseTitle");
      const descriptionEl = document.getElementById("poseDescription");
      const errorEl = document.getElementById("errorText");

      const mouthIndexes = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 78, 95, 88, 178, 87, 14, 317, 402, 318, 324];

      const imagesByLabel = {
        idle: {
          title: "No gesture mapped yet",
          description: "Tracking is running. You can now map custom gestures to images.",
          src: makePlaceholder("Idle / no custom gesture", "#0ea5e9", "#1e293b"),
        },
        tracking_full: {
          title: "Full body + hands + face tracking",
          description: "Pose, fingers, and face landmarks (mouth included) are all detected.",
          src: makePlaceholder("Full holistic tracking", "#22c55e", "#14532d"),
        },
      };

      setDisplayedImage("idle");

      const holistic = new Holistic({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`,
      });

      holistic.setOptions({
        modelComplexity: 2,
        smoothLandmarks: true,
        enableSegmentation: false,
        refineFaceLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      holistic.onResults(onResults);

      function resizeOverlay() {
        canvas.width = video.videoWidth || video.clientWidth;
        canvas.height = video.videoHeight || video.clientHeight;
      }

      function onResults(results) {
        resizeOverlay();
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        // Pose skeleton
        if (results.poseLandmarks) {
          drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {
            color: "#f97316",
            lineWidth: 3,
          });
          drawLandmarks(ctx, results.poseLandmarks, {
            color: "#22d3ee",
            lineWidth: 1,
            radius: 3,
          });
        }

        // Left hand (includes finger joints)
        if (results.leftHandLandmarks) {
          drawConnectors(ctx, results.leftHandLandmarks, HAND_CONNECTIONS, {
            color: "#a855f7",
            lineWidth: 3,
          });
          drawLandmarks(ctx, results.leftHandLandmarks, {
            color: "#d8b4fe",
            lineWidth: 1,
            radius: 4,
          });
        }

        // Right hand (includes finger joints)
        if (results.rightHandLandmarks) {
          drawConnectors(ctx, results.rightHandLandmarks, HAND_CONNECTIONS, {
            color: "#f43f5e",
            lineWidth: 3,
          });
          drawLandmarks(ctx, results.rightHandLandmarks, {
            color: "#fecdd3",
            lineWidth: 1,
            radius: 4,
          });
        }

        // Face mesh (detailed)
        if (results.faceLandmarks) {
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_TESSELATION, {
            color: "#475569",
            lineWidth: 0.6,
          });
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_RIGHT_EYE, {
            color: "#60a5fa",
            lineWidth: 1.8,
          });
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_LEFT_EYE, {
            color: "#60a5fa",
            lineWidth: 1.8,
          });
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_RIGHT_EYEBROW, {
            color: "#93c5fd",
            lineWidth: 1.4,
          });
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_LEFT_EYEBROW, {
            color: "#93c5fd",
            lineWidth: 1.4,
          });
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_FACE_OVAL, {
            color: "#34d399",
            lineWidth: 1.5,
          });
          drawConnectors(ctx, results.faceLandmarks, FACEMESH_LIPS, {
            color: "#f472b6",
            lineWidth: 2,
          });

          // Additional mouth points highlighted
          for (const idx of mouthIndexes) {
            const p = results.faceLandmarks[idx];
            if (!p) continue;
            ctx.beginPath();
            ctx.arc(p.x * canvas.width, p.y * canvas.height, 2.8, 0, 2 * Math.PI);
            ctx.fillStyle = "#fb7185";
            ctx.fill();
          }
        }

        ctx.restore();

        const poseCount = results.poseLandmarks ? results.poseLandmarks.length : 0;
        const handCount = (results.leftHandLandmarks ? 1 : 0) + (results.rightHandLandmarks ? 1 : 0);
        const faceCount = results.faceLandmarks ? results.faceLandmarks.length : 0;

        poseCountEl.textContent = String(poseCount);
        handCountEl.textContent = String(handCount);
        faceCountEl.textContent = String(faceCount);

        const label = classifyGesture(results);
        labelEl.textContent = label;
        setDisplayedImage(label);
      }

      function classifyGesture(results) {
        // TODO: Replace with your custom golf gesture rules.
        const hasPose = !!results.poseLandmarks;
        const hasHand = !!results.leftHandLandmarks || !!results.rightHandLandmarks;
        const hasFace = !!results.faceLandmarks;
        if (hasPose && hasHand && hasFace) return "tracking_full";
        return "idle";
      }

      async function start() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
          });

          video.srcObject = stream;

          await new Promise((resolve) => {
            video.onloadedmetadata = () => resolve();
          });

          resizeOverlay();
          window.addEventListener("resize", resizeOverlay);

          const camera = new Camera(video, {
            onFrame: async () => {
              await holistic.send({ image: video });
            },
            width: 1280,
            height: 720,
          });

          camera.start();
        } catch (error) {
          errorEl.textContent = `Startup error: ${error.message}`;
          console.error(error);
        }
      }

      function setDisplayedImage(label) {
        const selected = imagesByLabel[label] || imagesByLabel.idle;
        imageEl.src = selected.src;
        titleEl.textContent = selected.title;
        descriptionEl.textContent = selected.description;
      }

      function makePlaceholder(text, accent, bg) {
        const svg = `
          <svg xmlns='http://www.w3.org/2000/svg' width='1200' height='800'>
            <defs>
              <linearGradient id='g' x1='0' x2='1' y1='0' y2='1'>
                <stop offset='0%' stop-color='${bg}' />
                <stop offset='100%' stop-color='#020617' />
              </linearGradient>
            </defs>
            <rect width='100%' height='100%' fill='url(#g)' />
            <circle cx='180' cy='180' r='120' fill='${accent}' opacity='0.35' />
            <circle cx='1020' cy='620' r='140' fill='${accent}' opacity='0.2' />
            <text x='50%' y='48%' text-anchor='middle' fill='#e2e8f0' font-size='62' font-family='Arial, sans-serif'>${text}</text>
            <text x='50%' y='57%' text-anchor='middle' fill='#94a3b8' font-size='30' font-family='Arial, sans-serif'>Swap with your own images later</text>
          </svg>
        `;

        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      }

      start();
    </script>
  </body>
</html>
